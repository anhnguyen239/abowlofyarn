<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Blog</title>
    <style>
        /* Basic Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }

        /* Header & Title */
        header {
            background: #333;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        /* Navigation Bar */
        nav {
            background: #444;
            display: flex;
            justify-content: center;
            padding: 0.5rem;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
        }
        nav a:hover {
            background-color: #555;
            border-radius: 4px;
        }

        /* Intro Box */
        .intro-box {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Image Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 2rem;
        }
        .gallery img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Creative Space</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="#diary">Diary</a>
        <a href="#blog">Blog</a>
        <a href="#crochet">Crochet</a>
        <a href="#minecraft">Minecraft</a>
    </nav>

    <div class="intro-box">
        <h2>About Me</h2>
        <p>Hi there! This is my personal corner of the internet where I document my adventures in Minecraft, my latest crochet projects, and daily thoughts.</p>
    </div>

    <section class="gallery">
        <img src="https://via.placeholder.com/300x200" alt="Crochet Project 1">
        <img src="https://via.placeholder.com/300x200" alt="Minecraft Build">
        <img src="https://via.placeholder.com/300x200" alt="Personal Photo">
    </section>

</body>
</html>
